name: Test extension

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  default-tests:
    name: Test (default)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: ./.github/actions/setup

      - name: Build extension
        run: npm run build

      - name: Execute tests
        run: xvfb-run -a npm test -- --label default

  env-tests:
    name: Test (${{ matrix.env }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        env: [pixi, uv]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: ./.github/actions/setup

      - name: Setup Pixi
        if: matrix.env == 'pixi'
        uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f
        with:
          pixi-version: v0.63.2
          run-install: false

      - name: Initialize Pixi workspace
        if: matrix.env == 'pixi'
        working-directory: fixtures/pixi-workspace
        run: pixi install --locked

      - name: Setup uv
        if: matrix.env == 'uv'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.23

      - name: Initialize uv workspace
        if: matrix.env == 'uv'
        working-directory: fixtures/uv-workspace
        run: uv sync --frozen

      - name: Build extension
        run: npm run build

      - name: Execute tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test -- --label ${{ matrix.env }}

      - name: Execute tests (macOS)
        if: runner.os == 'macOS'
        run: npm test -- --label ${{ matrix.env }}
